input {
  # Accept logs from our Python application via TCP
  tcp {
    port => 5000
    codec => json
  }
  
  # Accept logs from Filebeat
  beats {
    port => 5044
  }
}

filter {
  # Parse timestamps
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
  
  # Parse log levels
  if [level] {
    mutate {
      add_field => { "[@metadata][level]" => "%{level}" }
    }
  }
  
  # Add custom fields
  mutate {
    add_field => {
      "application" => "token-optimizer"
      "environment" => "production"
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "token-optimizer-logs-%{+YYYY.MM.dd}"
    manage_template => false
  }
  
  # Also print to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
