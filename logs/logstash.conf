input {
  # Accept logs from our Python pipeline via TCP (JSON format)
  tcp {
    port => 5000
    codec => json_lines
  }

  # Also accept from stdin for quick testing
  stdin {
    codec => json_lines
  }
}

filter {
  # Parse timestamp if present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Add pipeline tag
  mutate {
    add_field => { "pipeline" => "token-optimizer" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "token-optimizer-logs-%{+YYYY.MM.dd}"
  }

  # Also print to Logstash console (useful for debugging)
  stdout {
    codec => rubydebug
  }
}
